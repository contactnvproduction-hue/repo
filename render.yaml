services:
  # ─── APPLICATION NEXT.JS ─────────────────────────────────────────────────
  - type: web
    name: new-vision-dashboard
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: npm install --legacy-peer-deps && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: DATABASE_URL
        fromDatabase:
          name: new-vision-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false  # À renseigner manuellement avec l'URL Render de l'app
      - key: NEXT_PUBLIC_APP_URL
        sync: false  # À renseigner manuellement avec l'URL Render de l'app
      - key: NODE_ENV
        value: production

  # ─── BASE DE DONNÉES POSTGRESQL ──────────────────────────────────────────
databases:
  - name: new-vision-db
    region: frankfurt
    plan: starter
    databaseName: newvision_db
    user: newvision_user
