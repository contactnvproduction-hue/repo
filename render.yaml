services:
  # ─── APPLICATION NEXT.JS ─────────────────────────────────────────────────
  - type: web
    name: new-vision-dashboard
    runtime: node
    region: frankfurt
    plan: starter
    branch: main
    buildCommand: npm install --include=dev --legacy-peer-deps && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20.19.2
      - key: DATABASE_URL
        fromDatabase:
          name: new-vision-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: NEXTAUTH_URL
        value: https://new-vision-dashboard-9468.onrender.com
      - key: NEXT_PUBLIC_APP_URL
        value: https://new-vision-dashboard-9468.onrender.com
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SIGNATURE_URL
        value: https://new-vision-dashboard-9468.onrender.com/nv-signature.html

  # ─── BASE DE DONNÉES POSTGRESQL ──────────────────────────────────────────
databases:
  - name: new-vision-db
    region: frankfurt
    plan: basic-256mb
    databaseName: newvision_db
    user: newvision_user
